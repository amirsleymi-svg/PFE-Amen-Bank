server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-type: PKCS12
    key-store-password: changeit
    key-alias: 1

spring:
  application:
    name: amen-bank

  datasource:
    url: jdbc:mysql://localhost:3306/amen_bank?useSSL=false&serverTimezone=Africa/Tunis&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  mail:
    host: ${MAIL_HOST:127.0.0.1}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enabled: false
            required: false
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

app:
  mail:
    from: ${MAIL_FROM:no-reply@amenbank.com.tn}

  jwt:
    secret: ${JWT_SECRET:aW1wb3J0YW50LXNlY3JldC1rZXktZm9yLWFtZW4tYmFuay1hcHBsaWNhdGlvbi0yMDI2LXNlY3VyZS1rZXktbXVzdC1iZS1sb25n}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000

  otp:
    expiration-minutes: 5
    length: 6

  account-lock:
    max-attempts: 5
    lock-duration-minutes: 30

  activation:
    token-expiration-hours: 24

  reset:
    token-expiration-hours: 1

  cors:
    allowed-origins: https://localhost:4200,http://localhost:4200

  fraud:
    threshold: 10000
    velocity-max-count: 5
    velocity-window-minutes: 10

  transfer:
    # Transfers whose amount is <= this threshold execute automatically, without
    # employee approval. Amounts above it stay PENDING until an employee approves.
    auto-approve-threshold: 1000

  initial-balance: 100.000
